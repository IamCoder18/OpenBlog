<!doctype html>

<html class="dark" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Post Editor | OpenBlog Editorial</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#d2bbff",
              "secondary-fixed": "#eaddff",
              "inverse-on-surface": "#303032",
              "tertiary-fixed": "#ffdcc6",
              "surface-container": "#201f21",
              "inverse-primary": "#732ee4",
              "inverse-surface": "#e5e1e4",
              secondary: "#d2bbff",
              "on-surface-variant": "#ccc3d8",
              "on-primary-fixed-variant": "#5a00c6",
              "on-primary-fixed": "#25005a",
              surface: "#131315",
              "on-error": "#690005",
              "on-background": "#e5e1e4",
              "primary-fixed-dim": "#d2bbff",
              "on-primary-container": "#ede0ff",
              "surface-dim": "#131315",
              "on-secondary-fixed-variant": "#523787",
              "primary-fixed": "#eaddff",
              "on-surface": "#e5e1e4",
              "on-tertiary-fixed-variant": "#713700",
              "on-tertiary": "#4f2500",
              "surface-bright": "#39393b",
              outline: "#958da1",
              "surface-container-high": "#2a2a2c",
              "on-tertiary-fixed": "#301400",
              "surface-variant": "#353437",
              "secondary-container": "#523787",
              "surface-container-low": "#1b1b1d",
              "on-secondary-container": "#c3a6ff",
              "tertiary-fixed-dim": "#ffb784",
              "error-container": "#93000a",
              "surface-container-highest": "#353437",
              primary: "#d2bbff",
              "surface-tint": "#d2bbff",
              "primary-container": "#7c3aed",
              "outline-variant": "#4a4455",
              tertiary: "#ffb784",
              "on-secondary-fixed": "#25005a",
              "on-secondary": "#3b1e6f",
              "surface-container-lowest": "#0e0e10",
              background: "#131315",
              "on-tertiary-container": "#ffe0cd",
              "tertiary-container": "#a15100",
              "on-primary": "#3f008e",
              error: "#ffb4ab",
              "on-error-container": "#ffdad6",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.125rem",
              lg: "0.25rem",
              xl: "0.5rem",
              full: "0.75rem",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
        display: inline-block;
        line-height: 1;
        text-transform: none;
        letter-spacing: normal;
        word-wrap: normal;
        white-space: nowrap;
        direction: ltr;
      }
      body {
        background-color: #131315;
        color: #e5e1e4;
      }
      .editor-gradient-bg {
        background: linear-gradient(135deg, #d2bbff 0%, #7c3aed 100%);
      }
    </style>
  </head>
  <body class="font-body selection:bg-primary/30">
    <!-- TopNavBar (Shared Component) -->
    <nav
      class="fixed top-0 w-full z-50 bg-zinc-950/70 backdrop-blur-xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] shadow-violet-500/5 transition-all duration-300"
    >
      <div
        class="flex items-center justify-between px-8 py-4 max-w-7xl mx-auto font-['Manrope'] tracking-tight antialiased text-sm font-medium"
      >
        <div class="flex items-center gap-8">
          <span class="text-xl font-bold tracking-tighter text-zinc-100"
            >OpenBlog</span
          >
          <div class="hidden md:flex items-center space-x-6">
            <a
              class="text-zinc-400 hover:text-zinc-100 transition-colors"
              href="#"
              >Feed</a
            >
            <a
              class="text-zinc-400 hover:text-zinc-100 transition-colors"
              href="#"
              >Explore</a
            >
            <a
              class="text-violet-300 border-b-2 border-violet-500 pb-1"
              href="#"
              >Dashboard</a
            >
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button
            class="p-2 text-zinc-400 hover:bg-zinc-800/50 rounded-lg transition-all active:scale-95"
          >
            <span class="material-symbols-outlined" data-icon="notifications"
              >notifications</span
            >
          </button>
          <button
            class="flex items-center gap-2 p-2 text-zinc-400 hover:bg-zinc-800/50 rounded-lg transition-all active:scale-95"
          >
            <span class="material-symbols-outlined" data-icon="account_circle"
              >account_circle</span
            >
          </button>
        </div>
      </div>
    </nav>
    <main class="pt-24 min-h-screen flex">
      <!-- Main Content Canvas (The Editor) -->
      <div class="flex-grow max-w-4xl mx-auto px-6 lg:px-12 mb-32">
        <!-- Contextual Header -->
        <header class="mb-12 flex items-end justify-between">
          <div>
            <p
              class="text-primary font-medium tracking-widest uppercase text-[10px] mb-2"
            >
              Drafting Suite
            </p>
            <h1
              class="font-headline text-4xl font-extrabold tracking-tighter text-on-surface"
            >
              New Story
            </h1>
          </div>
          <div class="flex items-center gap-3">
            <button
              class="px-5 py-2 text-sm font-medium text-on-surface bg-surface-container-highest border border-outline-variant/15 rounded-lg hover:bg-surface-container-high transition-all"
            >
              Preview
            </button>
            <button
              class="editor-gradient-bg px-6 py-2 text-sm font-semibold text-on-primary rounded-lg shadow-lg shadow-primary-container/20 active:scale-95 transition-all"
            >
              Publishing options
            </button>
          </div>
        </header>
        <!-- Editor Surface -->
        <section class="space-y-8">
          <!-- Title Field -->
          <div class="group">
            <label class="block text-xs font-medium text-outline mb-4 ml-1"
              >Story Title</label
            >
            <input
              class="w-full bg-transparent border-none focus:ring-0 text-5xl font-headline font-bold text-on-surface placeholder:text-surface-variant tracking-tight p-0"
              placeholder="Enter a captivating title..."
              type="text"
            />
            <div
              class="h-[2px] w-full bg-outline-variant/20 mt-4 group-focus-within:bg-primary transition-all duration-500 shadow-primary/20"
            ></div>
          </div>
          <!-- Rich Toolbar -->
          <div
            class="flex items-center gap-1 p-1 bg-surface-container-low/50 backdrop-blur-md rounded-xl sticky top-24 z-30 border border-outline-variant/10"
          >
            <button
              class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors"
            >
              <span class="material-symbols-outlined">format_bold</span>
            </button>
            <button
              class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors"
            >
              <span class="material-symbols-outlined">format_italic</span>
            </button>
            <button
              class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors"
            >
              <span class="material-symbols-outlined"
                >format_list_bulleted</span
              >
            </button>
            <div class="w-px h-6 bg-outline-variant/20 mx-1"></div>
            <button
              class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors"
            >
              <span class="material-symbols-outlined">image</span>
            </button>
            <button
              class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors"
            >
              <span class="material-symbols-outlined">link</span>
            </button>
            <button
              class="p-2 hover:bg-surface-container rounded-lg text-on-surface-variant transition-colors"
            >
              <span class="material-symbols-outlined">code</span>
            </button>
            <div class="flex-grow"></div>
            <button
              class="px-3 text-xs font-medium text-primary hover:bg-primary/5 py-2 rounded-lg transition-colors"
            >
              Markdown guide
            </button>
          </div>
          <!-- Main Editor Area -->
          <div
            class="min-h-[600px] text-lg leading-relaxed text-on-surface-variant font-body"
          >
            <textarea
              class="w-full bg-transparent border-none focus:ring-0 resize-none h-full p-0 placeholder:text-surface-variant"
              placeholder="Begin your narrative..."
            ></textarea>
          </div>
        </section>
      </div>
      <!-- Meta Sidebar (Refined Editorial SideNav Style) -->
      <aside
        class="hidden xl:flex flex-col w-80 bg-surface-container-lowest h-[calc(100vh-64px)] fixed right-0 top-16 z-40 p-8 space-y-8 border-l border-outline-variant/5"
      >
        <div>
          <h3
            class="font-headline font-bold text-on-surface mb-6 flex items-center gap-2"
          >
            <span class="material-symbols-outlined text-primary text-xl"
              >settings_suggest</span
            >
            Post Settings
          </h3>
          <div class="space-y-6">
            <!-- Featured Image -->
            <div class="group">
              <label
                class="block text-xs font-semibold text-outline uppercase tracking-wider mb-3"
                >Cover Image</label
              >
              <div
                class="aspect-video w-full rounded-xl bg-surface-container-low border-2 border-dashed border-outline-variant/20 flex flex-col items-center justify-center cursor-pointer hover:border-primary/50 transition-all overflow-hidden relative"
              >
                <img
                  class="absolute inset-0 w-full h-full object-cover opacity-40 group-hover:scale-105 transition-transform duration-700"
                  data-alt="Abstract aesthetic minimal writing desk scene"
                  src="https://lh3.googleusercontent.com/aida-public/AB6AXuDizUB1b7cO-1nNGgkEceIJtfSphVczDewOrapP4G9r0CI9M619Y-X4a5Zkr_i8RQKyP7fiOShqenPSZHwDmbtc2jrdvOvIPqwuLW-xd-sKOC7qc32UWldMiJ7tMhPSbAyZLHHDwfbvchgdMFduA9rZxd7c3QXloBmd3tIdl_d2D4NLlPKMotJUsJ23QzB1K8XyMLmKyuMxlM6BOpUx5yppJsdCbh6AFRJFRnsTDP5JDCdXWQnTF1QQkevVkxyWP3beMpKX5Qoc8g"
                />
                <div class="relative z-10 flex flex-col items-center">
                  <span
                    class="material-symbols-outlined text-on-surface-variant mb-2"
                    >add_a_photo</span
                  >
                  <span class="text-[10px] text-outline">Replace Image</span>
                </div>
              </div>
            </div>
            <!-- Tags -->
            <div>
              <label
                class="block text-xs font-semibold text-outline uppercase tracking-wider mb-3"
                >Topic Tags</label
              >
              <div class="flex flex-wrap gap-2">
                <span
                  class="px-3 py-1 bg-surface-container-high text-xs rounded-full border border-outline-variant/10 text-primary"
                  >Editorial</span
                >
                <span
                  class="px-3 py-1 bg-surface-container-high text-xs rounded-full border border-outline-variant/10 text-on-surface-variant"
                  >Design</span
                >
                <button
                  class="p-1 text-outline hover:text-primary transition-colors"
                >
                  <span class="material-symbols-outlined text-sm"
                    >add_circle</span
                  >
                </button>
              </div>
            </div>
            <!-- Visibility -->
            <div>
              <label
                class="block text-xs font-semibold text-outline uppercase tracking-wider mb-3"
                >Visibility</label
              >
              <div
                class="bg-surface-container-low rounded-xl p-3 flex items-center justify-between border border-outline-variant/5"
              >
                <span class="text-xs text-on-surface font-medium">Public</span>
                <span class="material-symbols-outlined text-primary text-sm"
                  >expand_more</span
                >
              </div>
            </div>
          </div>
        </div>
        <!-- SEO Preview Recess -->
        <div
          class="mt-auto p-4 rounded-xl bg-surface-container-low border border-outline-variant/5"
        >
          <p class="text-[10px] font-bold text-outline uppercase mb-2">
            Search Preview
          </p>
          <div class="space-y-1">
            <div class="h-2 w-3/4 bg-primary/20 rounded"></div>
            <div class="h-1.5 w-full bg-outline-variant/20 rounded"></div>
            <div class="h-1.5 w-5/6 bg-outline-variant/20 rounded"></div>
          </div>
        </div>
        <!-- Footer Meta -->
        <div
          class="pt-6 border-t border-outline-variant/5 text-[10px] text-outline flex items-center justify-between"
        >
          <div class="flex items-center gap-1">
            <span
              class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"
            ></span>
            <span>All changes saved</span>
          </div>
          <span>428 Words</span>
        </div>
      </aside>
    </main>
    <!-- Floating Actions Mobile Only -->
    <div class="md:hidden fixed bottom-6 right-6 flex flex-col gap-3">
      <button
        class="w-12 h-12 rounded-full bg-surface-container-highest shadow-xl border border-outline-variant/20 flex items-center justify-center text-primary"
      >
        <span class="material-symbols-outlined">visibility</span>
      </button>
      <button
        class="w-14 h-14 rounded-full editor-gradient-bg shadow-xl shadow-primary-container/30 flex items-center justify-center text-on-primary"
      >
        <span class="material-symbols-outlined">send</span>
      </button>
    </div>
    <!-- Footer (Shared Component - Hidden in focused Editor as per Shell Visibility Rule) -->
    <!-- Suppressing Footer for distraction-free task-focused UI -->
  </body>
</html>
